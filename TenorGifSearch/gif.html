<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MDB -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.4.1/mdb.min.css" rel="stylesheet" />
</head>

<body>
    <div class = "top-background">
        <h1 class="display-2 center-text top-padding">Caption Gif Search</h1>
        <p class="lead center-text">
            Powered by Tenor, this webpage allows you to search for gifs, only returning ones that are caption gifs
        </p>
        <div class="container-fluid ">
            <nav class="navbar navbar-light bg-light max-width form-group">
                <form class="form-inline center-div">
                    <input id="searchInput" class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                    <button id="searchButton" class="btn btn-outline-success my-2 mr-sm-2" type="button">Search</button>
                    <small id="passwordHelpInline" class="text-muted mr-sm-2">
                        Display size
                    </small>
                    <select id="searchLimit" class="form-control center-text mr-sm-2">
                    <option>5</option>
                    <option>10</option>
                    <option>25</option>
                    <option>50</option>
                    <option>99</option>
                    </select>
                    <small id="passwordHelpInline" class="text-muted mr-sm-2">
                        Caption Gifs Only
                    </small>
                    <div class="form-switch mr-sm-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="captionToggle">
                        
                    </div>

                </form>
            </nav>
        </div>
    </div>


    <div class=" wrapper ">
        <div class="images " id="gif_results">
        </div>
    </div>

    <script src="gif.js "></script>
</body>

</html>
